<div class="contenedor">
  <header class="header">
    <h1>Editar Expediente</h1>
  </header>

  <section class="seccion-formulario">
    <h2>Datos del Expediente #{{ expediente.id }}</h2>

    @if (mensajeError) {
      <div class="mensaje-error">
        {{ mensajeError }}
      </div>
    }

    @if (expediente.id !== 0) {
      <div class="formulario">
        <!-- Campo: Número -->
        <div class="campo">
          <label>Número</label>
          <input type="text"
            placeholder="Ej: EXP-123"
            [(ngModel)]="expediente.numero"
            [class.input-error]="!expediente.numero && mensajeError">
        </div>

        <!-- Campo: Estado -->
        <div class="campo">
          <label>Estado</label>
          <select [(ngModel)]="expediente.estado" [class.input-error]="!expediente.estado && mensajeError">
            <option value="">Seleccionar estado</option>
            <option value="En Proceso">En Proceso</option>
            <option value="Finalizado">Finalizado</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Cancelado">Cancelado</option>
          </select>
        </div>

        <!-- Campo: Prioridad -->
        <div class="campo">
          <label>Prioridad</label>
          <select [(ngModel)]="expediente.prioridad" [class.input-error]="!expediente.prioridad && mensajeError">
            <option value="">Seleccionar prioridad</option>
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
            <option value="Baja">Baja</option>
          </select>
        </div>

        <!-- Campo: Fecha -->
        <div class="campo">
          <label>Fecha de Creación</label>
          <input type="date"
            [(ngModel)]="expediente.fechaCreacion"
            [class.input-error]="!expediente.fechaCreacion && mensajeError">
        </div>

        <!-- Acciones -->
        <div class="acciones-form">
          <button class="btn-primario" (click)="guardarCambios()">Guardar Cambios</button>
          <button class="btn-secundario" routerLink="/bandeja">Cancelar</button>
        </div>
      </div>
    } @else {
      <div class="acciones-form">
        <button class="btn-secundario" routerLink="/bandeja">Volver a la Bandeja</button>
      </div>
    }
  </section>
</div>
