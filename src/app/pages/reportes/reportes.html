<div class="page-container">

  <div class="page-header-block">
    <div class="header-icon-wrap">
      <mat-icon>bar_chart</mat-icon>
    </div>
    <div>
      <h1 class="page-title">Resumen de Expedientes</h1>
      <p class="page-subtitle">Totalizador de gestiones por estado.</p>
    </div>
  </div>

  <div class="stats-grid">

    <mat-card class="stat-card card-pendiente">
      <mat-card-content>
        <div class="stat-icon-wrap">
          <mat-icon>pending_actions</mat-icon>
        </div>
        <p class="stat-count">{{ totalPendientes }}</p>
        <p class="stat-label">Pendientes</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card card-proceso">
      <mat-card-content>
        <div class="stat-icon-wrap">
          <mat-icon>autorenew</mat-icon>
        </div>
        <p class="stat-count">{{ totalEnProceso }}</p>
        <p class="stat-label">En Proceso</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card card-finalizado">
      <mat-card-content>
        <div class="stat-icon-wrap">
          <mat-icon>check_circle</mat-icon>
        </div>
        <p class="stat-count">{{ totalFinalizados }}</p>
        <p class="stat-label">Finalizados</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card card-total">
      <mat-card-content>
        <div class="stat-icon-wrap">
          <mat-icon>folder_open</mat-icon>
        </div>
        <p class="stat-count">{{ totalGeneral }}</p>
        <p class="stat-label">Total General</p>
      </mat-card-content>
    </mat-card>

  </div>
</div>
